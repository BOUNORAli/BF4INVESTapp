spring:
  application:
    name: bf4-invest-backend
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/bf4invest}
      database: bf4invest
  
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    # Compression GZIP
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css,application/pdf
    min-response-size: 1024 # Compresser les réponses > 1KB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:bf4invest-secret-key-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:3600000} # 1 hour in milliseconds (access token)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in milliseconds (refresh token)

# Auth cookies (httpOnly) - set COOKIE_SECURE=true in production (HTTPS)
cookie:
  secure: ${COOKIE_SECURE:false}

# Application Configuration
app:
  name: BF4 Invest
  bc:
    number-prefix: BF4-BC
  facture:
    achat:
      numero-prefix: FA
    vente:
      numero-prefix: FV
  default-payment-term-days: 30
  purchase-invoice-due-days: 60 # 2 months for purchase invoices

# Supabase (pour fichiers Facture Achat)
supabase:
  url: ${SUPABASE_URL:}
  service-key: ${SUPABASE_SERVICE_KEY:}
  bucket:
    factures: ${SUPABASE_BUCKET_FACTURES:factures-achat}

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder:
    factures: ${CLOUDINARY_FOLDER_FACTURES:bf4/factures}
    releves: ${CLOUDINARY_FOLDER_RELEVES:bf4/releves}

# OCR documents BC : OpenRouter (principal par défaut) + Gemini (secours)
# Variables: OCR_PROVIDER_PRIMARY (openrouter|gemini), OCR_FALLBACK_ENABLED, OPENROUTER_*, GEMINI_*
ocr:
  provider:
    primary: ${OCR_PROVIDER_PRIMARY:openrouter}
    fallback-enabled: ${OCR_FALLBACK_ENABLED:true}
  timeout-seconds:
    openrouter: ${OCR_TIMEOUT_OPENROUTER:60}
    gemini: ${OCR_TIMEOUT_GEMINI:60}

# OpenRouter (API compatible OpenAI, vision via data URL base64)
# Modèle free exemple : google/gemini-2.0-flash-exp:free — vérifier les modèles gratuits sur https://openrouter.ai/models
openrouter:
  api-key: ${OPENROUTER_API_KEY:}
  api-url: ${OPENROUTER_API_URL:https://openrouter.ai/api/v1}
  model: ${OPENROUTER_MODEL:google/gemini-2.0-flash-exp:free}
  http-referer: ${OPENROUTER_HTTP_REFERER:}
  app-title: ${OPENROUTER_APP_TITLE:BF4 Invest}
  # true seulement si le modèle supporte response_format json_object (sinon laisser false)
  request-json-mode: ${OPENROUTER_REQUEST_JSON_MODE:false}

# Google Gemini (secours ou principal si OCR_PROVIDER_PRIMARY=gemini)
gemini:
  api-key: ${GEMINI_API_KEY:}
  api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
  # Modèle vérifié disponible avec cette clé API (liste obtenue via /v1beta/models)
  # gemini-2.0-flash-001 : Version stable rapide et versatile (janvier 2025)
  # Alternatives disponibles: gemini-2.0-flash, gemini-2.5-flash, gemini-flash-latest
  model: ${GEMINI_MODEL:gemini-2.0-flash-001}

# CORS Configuration
cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://127.0.0.1:4200}
  
logging:
  level:
    com.bf4invest: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.mongodb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"


